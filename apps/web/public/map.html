<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Aegis — confidential review flow</title>
<style>
  :root{
    --ink:#141A24; --paper:#F3F5F8; --panel:#FFFFFF; --line:#C7CFD8;
    --slate:#5C6470; --teal:#0E7C6B; --teal-soft:#E3F1EE;
    --violet:#5B4AA8; --violet-soft:#ECE8F7;
    --amber:#A8690B; --amber-soft:#FBF0DC; --danger:#B42318; --danger-soft:#FBE7E4;
    --navy:#1C2438;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{background:var(--paper);color:var(--ink);
    font-family:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    padding:28px 20px 36px;}
  .wrap{max-width:1240px;margin:0 auto;animation:fade .6s ease both}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  @media (prefers-reduced-motion:reduce){.wrap{animation:none}}
  svg{width:100%;height:auto;display:block}
  .ey{font-size:13px;font-weight:700;letter-spacing:.22em;fill:var(--teal)}
  .h1{font-size:26px;font-weight:800;fill:var(--ink)}
  .sub{font-size:15px;fill:var(--slate)}
  .ct{font-size:17px;font-weight:700}
  .cb{font-size:14px;fill:var(--slate)}
  .cw{font-size:15px;font-weight:700;fill:#EAF0F2}
  .cwb{font-size:13.5px;fill:#AEB8C8}
  .mono{font-family:ui-monospace,"SF Mono",Menlo,Consolas,monospace;font-size:13px}
  .lbl{font-size:13px;font-weight:700}
  .note{font-size:13px;font-style:italic}
  .tag{font-size:11.5px;font-weight:800;letter-spacing:.12em}
</style>
</head>
<body>
<div class="wrap">
<svg viewBox="0 0 1240 530" xmlns="http://www.w3.org/2000/svg" role="img"
     aria-label="Chainlink CRE review flow: a public skill is reviewed by an LLM in a TEE, the verdict is written to an on-chain registry, and a load gate checks it before the skill runs">
  <defs>
    <marker id="t" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto"><path d="M0 0 L7 3 L0 6 Z" fill="#0E7C6B"/></marker>
    <marker id="s" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto"><path d="M0 0 L7 3 L0 6 Z" fill="#5C6470"/></marker>
    <marker id="a" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto"><path d="M0 0 L7 3 L0 6 Z" fill="#A8690B"/></marker>
    <symbol id="lock" viewBox="0 0 16 16"><path d="M5 7.2V5.1a3 3 0 0 1 6 0v2.1" fill="none" stroke="currentColor" stroke-width="1.5"/><rect x="3.4" y="7.2" width="9.2" height="6.4" rx="1.5" fill="currentColor" fill-opacity="0.18" stroke="currentColor" stroke-width="1.4"/></symbol>
  </defs>

  <text class="ey" x="40" y="40">AEGIS · TRUSTLESS REVIEW</text>
  <text class="h1" x="40" y="76">One review pipeline, verifiable end-to-end</text>
  <text class="sub" x="40" y="104">A Chainlink CRE workflow runs an LLM review inside a TEE and writes a verifiable verdict on-chain — no reviewer you have to trust.</text>

  <!-- PUBLIC source -->
  <rect x="40" y="200" width="220" height="92" rx="11" fill="var(--panel)" stroke="var(--teal)" stroke-opacity="0.6"/>
  <text class="tag" x="60" y="228" fill="var(--teal)">PUBLIC</text>
  <text class="ct" x="60" y="254" fill="var(--ink)">Public skill / package</text>
  <text class="cb" x="60" y="277">GitHub · npm · ClawHub</text>

  <!-- TEE enclave -->
  <rect x="345" y="150" width="295" height="240" rx="13" fill="var(--navy)"/>
  <use href="#lock" x="363" y="169" width="16" height="16" color="#7FE7D6"/>
  <text class="cw" x="391" y="182">Chainlink CRE · Confidential AI</text>
  <text class="cwb" x="363" y="204">TEE enclave — runs on a DON</text>
  <text class="cw" x="363" y="234">LLM reviews the code for:</text>
  <text class="cwb" x="363" y="256">· injection hidden in SKILL.md</text>
  <text class="cwb" x="363" y="276">· credential / exfil patterns</text>
  <text class="cwb" x="363" y="296">· obfuscation, malicious install scripts</text>
  <line x1="363" y1="315" x2="622" y2="315" stroke="#33405E"/>
  <text class="cwb" x="363" y="337">Remote attestation proves the pinned</text>
  <text class="cwb" x="363" y="356">model + prompt ran on this exact input</text>
  <text class="cw" x="363" y="380" fill="#7FE7D6">→ risk verdict + flags + proof</text>

  <!-- source -> enclave -->
  <path d="M260 246 L345 250" fill="none" stroke="var(--teal)" stroke-width="1.7" marker-end="url(#t)"/>
  <text class="lbl" x="270" y="238" fill="var(--teal)">open fetch</text>

  <!-- enclave -> registry -->
  <path d="M640 270 L720 270" fill="none" stroke="var(--slate)" stroke-width="1.7" marker-end="url(#s)"/>
  <text class="lbl" x="664" y="262" fill="var(--slate)">verdict</text>

  <!-- registry -->
  <rect x="720" y="195" width="236" height="150" rx="12" fill="var(--panel)" stroke="var(--line)"/>
  <text class="ct" x="740" y="224" fill="var(--ink)">On-chain registry</text>
  <text class="cb" x="740" y="245">ENS-named · append-only</text>
  <text class="mono" x="740" y="273" fill="var(--ink)">pinned hash</text>
  <text class="mono" x="740" y="295" fill="var(--ink)">risk verdict + proof</text>
  <text class="mono" x="740" y="317" fill="var(--ink)">revocations</text>
  <text class="cb" x="740" y="339">neutral — anyone reads it</text>

  <!-- registry -> gate -->
  <path d="M956 270 L1000 270" fill="none" stroke="var(--slate)" stroke-width="1.7" marker-end="url(#s)"/>

  <!-- gate -->
  <rect x="1000" y="150" width="212" height="240" rx="12" fill="var(--paper)" stroke="var(--line)"/>
  <text class="ct" x="1020" y="180" fill="var(--ink)">Load gate</text>
  <text class="cb" x="1020" y="201">runs in the agent / installer</text>
  <text class="mono" x="1020" y="231" fill="var(--ink)">hash == pinned?</text>
  <text class="mono" x="1020" y="253" fill="var(--ink)">verdict meets policy?</text>
  <text class="mono" x="1020" y="275" fill="var(--ink)">not revoked?</text>

  <rect x="1020" y="294" width="172" height="36" rx="8" fill="var(--teal-soft)" stroke="var(--teal)" stroke-opacity="0.6"/>
  <text class="lbl" x="1034" y="317" fill="var(--teal)">✓ run in sandbox</text>
  <rect x="1020" y="340" width="172" height="46" rx="8" fill="var(--danger-soft)" stroke="var(--danger)" stroke-opacity="0.6"/>
  <text class="lbl" x="1034" y="361" fill="var(--danger)">✕ block →</text>
  <text class="cb" x="1034" y="378">Ledger: human approves?</text>

  <!-- watcher loop -->
  <rect x="345" y="425" width="611" height="60" rx="11" fill="var(--panel)" stroke="var(--line)" stroke-dasharray="5 4"/>
  <text class="ct" x="365" y="452" fill="var(--ink)">CRE watcher (always on)</text>
  <text class="cb" x="365" y="473">re-hashes pins to catch drift · relays OSV + advisories → writes revocations</text>
  <path d="M810 425 L810 347" fill="none" stroke="var(--amber)" stroke-width="1.6" stroke-dasharray="4 3" marker-end="url(#a)"/>

  <!-- value annotation -->
  <text class="lbl" x="40" y="332" fill="var(--teal)">why it's trustless:</text>
  <text class="cb" x="40" y="353">verifiable, reusable verdict —</text>
  <text class="cb" x="40" y="372">trust the pinned model + TEE,</text>
  <text class="cb" x="40" y="391">not the reviewer's word.</text>

  <!-- honest limit -->
  <text class="note" x="40" y="512" fill="var(--slate)">Honest limit: the TEE proves the model ran honestly — not that its judgment is right. The verdict is one signal; the sandbox and the gate do the actual preventing.</text>
</svg>
</div>
</body>
</html>
